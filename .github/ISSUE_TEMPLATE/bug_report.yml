name: Bug Report
description: Report a bug in Hector ORM
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - hectororm/collection
        - hectororm/connection
        - hectororm/data-types
        - hectororm/migration
        - hectororm/orm
        - hectororm/pagination
        - hectororm/query
        - hectororm/schema
        - Other / Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of Hector ORM are you using?
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "e.g. 8.2.15"
    validations:
      required: false
